addFolder:
  title: Добавить папку
  change: Изменить
  nameLabel: Название папки
  nameHint: например, Фото
  idLabel: Folder ID
  idHint: foto
  idInfo: Что это?
  idInfoTitle: Folder ID
  idInfoBody: >-
    Folder ID — это то, по чему ваши устройства понимают, что это одна и та же
    папка. Устройства с одинаковым ID считают её общей, а не создают дубликат. Он
    формируется из названия папки — назовите папку одинаково на каждом устройстве,
    и ID совпадут автоматически. Можно изменить и вручную. Само соединение
    устройств по-прежнему идёт через сопряжение (QR); ID не является паролем.
  idTaken: Папка с таким ID уже существует
  pathTaken: Эта папка уже добавлена
  access: Доступ устройств
  accessHint: Выберите, какие сопряжённые устройства могут синхронизировать папку
  noPeers: Сначала сопрягите устройство, чтобы поделиться папкой
  send: Отправлять файлы
  receive: Получать файлы
  create: Добавить папку
  gotIt: Понятно
